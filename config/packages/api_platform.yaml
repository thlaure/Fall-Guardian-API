api_platform:
    title: Fall Guardian Backend API
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    swagger:
        http_auth:
            deviceBearer:
                scheme: bearer
                bearerFormat: Device token
